name: Deploy to Pantheon DEV

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# Only trigger on pull request closed events to master
on:
  pull_request:
    branches:
      - master
      - main
    types: [ closed ]
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to deploy (defaults to main/master)'
        required: false
        type: string
        default: 'master'

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true }}
    uses: Square360/shared-workflows/.github/workflows/reusable-pantheon-deploy-dev.yml@aa8c63942a061cc9cdb89fb6669e877ec156251b  # v3.0.3
    with:
      pantheon_site: ${{ vars.PANTHEON_SITE }}
      backup_hours_threshold: 6
      run_semantic_release: true
      slack_channel: ${{ vars.SLACK_CHANNEL }}
      workflow_skip_terminus: ${{ vars.WORKFLOW_SKIP_TERMINUS == 'true' }}
    secrets:
      PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_KEY }}
      PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
      CI_GH_TOKEN: ${{ secrets.CI_GH_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}