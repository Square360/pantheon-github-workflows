name: Deploy to Pantheon Multi-Dev

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened,synchronize,reopened,closed]
    branches-ignore:
      - master
      - main

jobs:
  composer_diff_comment:
    name: Composer Diff Comment
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize') }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Generate Composer diff markdown
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail
          # Ensure composer.lock exists in the PR branch
          if [ ! -f composer.lock ]; then
            {
              echo "### Composer dependency changes"
              echo ""
              echo "> composer.lock not found in this branch."
            } > composer_diff.md
            exit 0
          fi

          # Fetch the base branch so we can read its composer.lock
          git fetch --no-tags --depth=1 origin "$BASE_REF"
          if ! git show "origin/$BASE_REF:composer.lock" > base_composer.lock 2>/dev/null; then
            {
              echo "### Composer dependency changes"
              echo ""
              echo "> No composer.lock on base branch '$BASE_REF' to diff against."
            } > composer_diff.md
            exit 0
          fi

          # Build TSVs of package -> version for PR and base (including dev packages)
          jq -r '.packages[]? | "\(.name)\t\(.version)"' composer.lock > pr.tsv
          jq -r '."packages-dev"[]? | "\(.name)\t\(.version)"' composer.lock >> pr.tsv
          jq -r '.packages[]? | "\(.name)\t\(.version)"' base_composer.lock > base.tsv
          jq -r '."packages-dev"[]? | "\(.name)\t\(.version)"' base_composer.lock >> base.tsv

          sort -u pr.tsv -o pr.tsv
          sort -u base.tsv -o base.tsv

          # Merge by package name: columns -> name, pr_version, base_version
          join -t $'\t' -a1 -a2 -e '' -o '1.1 1.2 2.2' -1 1 -2 1 pr.tsv base.tsv | sort > merged.tsv

          ADDED=$(awk -F'\t' 'NF==3 && $2 != "" && $3 == "" {print}' merged.tsv | wc -l | tr -d ' ')
          REMOVED=$(awk -F'\t' 'NF==3 && $2 == "" && $3 != "" {print}' merged.tsv | wc -l | tr -d ' ')
          CHANGED=$(awk -F'\t' 'NF==3 && $2 != "" && $3 != "" && $2 != $3 {print}' merged.tsv | wc -l | tr -d ' ')

          TOTAL=$((ADDED + REMOVED + CHANGED))

          {
            echo "### Composer dependency changes"
            echo ""
            echo "- Base: \`$BASE_REF\` vs PR: \`${{ github.head_ref || github.ref_name }}\`"
            echo "- Packages changed: $TOTAL (added: $ADDED, removed: $REMOVED, changed: $CHANGED)"
            echo ""
            if [ "$TOTAL" -eq 0 ]; then
              echo "> No changes detected in composer.lock."
            else
              echo "- Legend: 🟩 added, 🟥 removed, 🟨 changed"
              echo ""
              echo "| Type | Package | Base | PR |"
              echo "|:--:|---|---:|---:|"
              # Changed
              awk -F'\t' 'NF==3 && $2 != "" && $3 != "" && $2 != $3 {printf "| 🟨 | %s | %s | %s |\n",$1,$3,$2}' merged.tsv | sort
              # Added
              awk -F'\t' 'NF==3 && $2 != "" && $3 == "" {printf "| 🟩 | %s | — | %s |\n",$1,$2}' merged.tsv | sort
              # Removed
              awk -F'\t' 'NF==3 && $2 == "" && $3 != "" {printf "| 🟥 | %s | %s | — |\n",$1,$3}' merged.tsv | sort
            fi
          } > composer_diff.md

      - name: Post or update sticky comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: composer-dependency-diff
          path: composer_diff.md

  composer_security_audit:
    name: Composer Security Audit
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened' || github.event.action == 'synchronize') }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: none

      - name: Run composer audit (warn-only)
        run: |
          set -euo pipefail

          if [[ ! -f composer.lock ]]; then
            {
              echo "### Composer security audit"
              echo ""
              echo "> No \`composer.lock\` found in this branch — nothing to audit."
            } > composer_audit.md
            exit 0
          fi

          # composer audit returns non-zero when advisories exist. We capture
          # the exit code but never fail the job: this is a warn-only check.
          set +e
          composer audit --format=json --no-interaction > composer-audit.json 2>composer-audit.err
          AUDIT_EXIT=$?
          set -e
          echo "composer audit exit code: $AUDIT_EXIT"

          # If composer itself errored before producing JSON, surface that.
          if [[ ! -s composer-audit.json ]]; then
            {
              echo "### Composer security audit"
              echo ""
              echo "> \`composer audit\` produced no output (exit code $AUDIT_EXIT). Stderr:"
              echo ""
              echo '```'
              cat composer-audit.err 2>/dev/null || true
              echo '```'
            } > composer_audit.md
            exit 0
          fi

          # Composer 2.4+ JSON shape:
          # { "advisories": { "vendor/pkg": [ {...}, ... ], ... }, "abandoned": { "vendor/pkg": "replacement" } }
          ADV_COUNT=$(jq '[.advisories // {} | to_entries[].value[]?] | length' composer-audit.json)
          ABANDONED_COUNT=$(jq '.abandoned // {} | length' composer-audit.json)

          {
            echo "### Composer security audit"
            echo ""
            if [[ "$ADV_COUNT" -eq 0 && "$ABANDONED_COUNT" -eq 0 ]]; then
              echo "✅ No known security advisories or abandoned packages in \`composer.lock\`."
            else
              echo "⚠️ **Warn-only check.** Findings below are advisory; the PR is not blocked."
              echo ""
              echo "- Advisories: $ADV_COUNT"
              echo "- Abandoned packages: $ABANDONED_COUNT"
              echo ""
              if [[ "$ADV_COUNT" -gt 0 ]]; then
                echo "#### Security advisories"
                echo ""
                echo "| Package | Severity | Advisory | Title |"
                echo "|---|---|---|---|"
                jq -r '
                  [.advisories // {} | to_entries[] as $e | $e.value[]? | . + {package: $e.key}]
                  | sort_by(.package)
                  | .[]
                  | (
                      "| " + (.package // "") + " | " +
                      (.severity // "unknown") + " | " +
                      (if (.link // "") != "" then "[" + (.cve // .advisoryId // "advisory") + "](" + .link + ")" else (.cve // .advisoryId // "advisory") end) + " | " +
                      ((.title // "") | gsub("\\|"; "\\|")) + " |"
                    )
                ' composer-audit.json
                echo ""
              fi
              if [[ "$ABANDONED_COUNT" -gt 0 ]]; then
                echo "#### Abandoned packages"
                echo ""
                echo "| Package | Suggested replacement |"
                echo "|---|---|"
                jq -r '.abandoned // {} | to_entries | sort_by(.key)[] | "| \(.key) | \(.value // "—") |"' composer-audit.json
              fi
            fi
          } > composer_audit.md

      - name: Post or update sticky comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: composer-security-audit
          path: composer_audit.md

  calculate_target_env:
    name: Calculate Target Environment
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.env_name.outputs.target_env }}
    steps:
    - name: Calculate environment name
      id: env_name
      run: |
        # Extract GitHub event variables for better readability
        BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
        EVENT_ACTION="${{ github.event.action }}"
        IS_MERGED="${{ github.event.pull_request.merged }}"
        PR_NUMBER="${{ github.event.pull_request.number }}"

        echo "Base branch: ${BASE_BRANCH}"
        echo "Event action: ${EVENT_ACTION}"
        echo "Is merged: ${IS_MERGED}"
        echo "PR number: ${PR_NUMBER}"

        # Check if this is a merged PR to the develop branch
        if [[ "${BASE_BRANCH}" == "develop" && "${EVENT_ACTION}" == "closed" && "${IS_MERGED}" == "true" ]]; then
          # For merged PRs to develop branch, use rc-YEAR-WEEK format
          YEAR=$(date +%Y)
          WEEK=$(date +%V)
          TARGET_ENV="rc-${YEAR}-${WEEK}"
          echo "Creating release candidate environment for merged develop PR"
        else
          # For all other cases (open PRs, PRs to other branches), use pr-NUMBER format
          TARGET_ENV="pr-${PR_NUMBER}"
          echo "Creating standard PR environment"
        fi

        echo "target_env=${TARGET_ENV}" >> $GITHUB_OUTPUT
        echo "Calculated target environment: ${TARGET_ENV}"

  run_static_tests:
    name: Run Static Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        coverage: none

    - name: Update composer in working docker container
      run: |
        sudo composer self-update
        composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

    - name: Run code linting
      run: |
        composer lint

    - name: Run code-sniffer
      run: |
        echo "FUTURE: Running PHP Code Sniffer..."

  deploy_multidev:
    name: Deploy to Multidev
    needs: [run_static_tests, calculate_target_env]
    if: ${{ github.event.action != 'closed' || github.event.pull_request.merged == true }}
    uses: Square360/shared-pantheon-workflows/.github/workflows/reusable-deploy-multidev.yml@10cd610d43ff52028f18748d6c92eaa3f40bbe8d  # v2.6
    with:
      pantheon_site: ${{ vars.PANTHEON_SITE }}
      target_env: ${{ needs.calculate_target_env.outputs.target_env }}
      slack_channel: ${{ vars.SLACK_CHANNEL }}
      workflow_skip_terminus: ${{ vars.WORKFLOW_SKIP_TERMINUS == 'true' }}
    secrets:
      PANTHEON_SSH_KEY: ${{ secrets.PANTHEON_SSH_KEY }}
      PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_TEAM_ID: ${{ secrets.CLICKUP_TEAM_ID }}

  visual_regression_test:
    name: Visual Regression Test
    needs: [deploy_multidev, calculate_target_env]
    # Runs for any environment (rc- or pr-) as long as deploy succeeded.
    # The reusable workflow gates execution on a [vrt] tag in the PR body.
    if: needs.deploy_multidev.result == 'success'
    uses: Square360/shared-pantheon-workflows/.github/workflows/reusable-visual-regression.yml@10cd610d43ff52028f18748d6c92eaa3f40bbe8d  # v2.6
    with:
      pantheon_site: ${{ vars.PANTHEON_SITE }}
      target_env: ${{ needs.calculate_target_env.outputs.target_env }}
      slack_channel: ${{ vars.SLACK_CHANNEL }}
    secrets:
      PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_TEAM_ID: ${{ secrets.CLICKUP_TEAM_ID }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  security_scan:
    name: Security Scan
    needs: [deploy_multidev, calculate_target_env]
    # Runs for any environment (rc- or pr-) as long as deploy succeeded.
    # Gating happens inside the reusable workflow:
    #   - rc-* environments always run, and fail the job on any High-severity finding.
    #   - pr-* environments run only when the PR body contains [security] or
    #     [security TASK-ID], and never fail (warn-only).
    if: needs.deploy_multidev.result == 'success'
    uses: Square360/shared-pantheon-workflows/.github/workflows/reusable-security-scan.yml@10cd610d43ff52028f18748d6c92eaa3f40bbe8d  # v2.6
    with:
      pantheon_site: ${{ vars.PANTHEON_SITE }}
      target_env: ${{ needs.calculate_target_env.outputs.target_env }}
      slack_channel: ${{ vars.SLACK_CHANNEL }}
    secrets:
      PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_TEAM_ID: ${{ secrets.CLICKUP_TEAM_ID }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}