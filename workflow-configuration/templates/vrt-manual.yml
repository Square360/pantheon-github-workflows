name: Manual Visual Regression Test

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to test (leave blank to use the most recent open PR)'
        required: false
        type: string

jobs:
  resolve_pr:
    name: Resolve PR
    runs-on: ubuntu-latest
    outputs:
      target_env: ${{ steps.resolve.outputs.target_env }}
      pr_head_ref: ${{ steps.resolve.outputs.pr_head_ref }}
    steps:
      - name: Resolve PR details
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          INPUT_PR: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          if [[ -n "$INPUT_PR" ]]; then
            # Validate the supplied PR is open
            STATE=$(gh pr view "$INPUT_PR" --repo "$GH_REPO" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")
            if [[ "$STATE" != "OPEN" ]]; then
              echo "::error::PR #${INPUT_PR} is not open (state: ${STATE}). Cannot run VRT."
              exit 1
            fi
            PR_NUMBER="$INPUT_PR"
          else
            # Use the most recent open PR
            PR_NUMBER=$(gh pr list --repo "$GH_REPO" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [[ -z "$PR_NUMBER" ]]; then
              echo "::error::No open PRs found in this repository. Cannot run VRT."
              exit 1
            fi
            echo "No PR specified — using most recent open PR: #${PR_NUMBER}"
          fi

          HEAD_REF=$(gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json headRefName --jq '.headRefName')

          echo "target_env=pr-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "pr_head_ref=${HEAD_REF}" >> "$GITHUB_OUTPUT"
          echo "Resolved: PR #${PR_NUMBER}, branch=${HEAD_REF}, target_env=pr-${PR_NUMBER}"

  visual_regression_test:
    name: Visual Regression Test
    needs: resolve_pr
    uses: Square360/shared-pantheon-workflows/.github/workflows/reusable-visual-regression.yml@main
    with:
      pantheon_site: ${{ vars.PANTHEON_SITE }}
      target_env: ${{ needs.resolve_pr.outputs.target_env }}
      pr_head_ref: ${{ needs.resolve_pr.outputs.pr_head_ref }}
      slack_channel: ${{ vars.SLACK_CHANNEL }}
      force_run: true
    secrets:
      PANTHEON_MACHINE_TOKEN: ${{ secrets.PANTHEON_MACHINE_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      CLICKUP_TEAM_ID: ${{ secrets.CLICKUP_TEAM_ID }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
