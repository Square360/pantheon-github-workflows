name: Semantic Release

# Default branch on this repo is `master`. Fires after each merge to master,
# computes the next version from conventional-commit messages, tags it, and
# publishes a GitHub release. From v2.0.15 onward this no longer has to be
# done by hand — pre-v2.0.15 tags (v1.6.0–v2.0.14) were cut manually because
# the prior version of this workflow triggered on the wrong branch AND
# hardcoded the wrong release branch in its semantic-release config.
on:
  push:
    branches:
      - master

jobs:
  semantic_release:
    uses: Square360/shared-workflows/.github/workflows/reusable-semantic-release.yml@6f34dc23f75ea38d0b8f41fb8fb6e7bbe3343935  # v3.2.1
    with:
      release_branches: '["master"]'
    secrets:
      CI_GH_TOKEN: ${{ secrets.CI_GH_TOKEN }}
